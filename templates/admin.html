<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Panel</title>

<style>

body{

    margin:0;

    background:#0f172a;

    font-family:Tahoma;

    color:white;

}

.container{

    max-width:1200px;

    margin:auto;

    padding:30px;

}

h1{

    text-align:center;

    margin-bottom:40px;

}

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

}

.card{

    background:#1e293b;

    border-radius:20px;

    padding:40px;

    text-align:center;

    cursor:pointer;

    transition:0.3s;

}

.card:hover{

    transform:translateY(-5px);

    background:#334155;

}

.icon{

    font-size:50px;

    margin-bottom:15px;

}

.title{

    font-size:24px;

}

.logout{

    margin-top:40px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#ef4444;

    color:white;

    font-size:20px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>

Admin Panel

</h1>

<div class="grid">

    <div
        class="card"
        onclick="location.href='/admin/users'"
    >

        <div class="icon">
            👥
        </div>

        <div class="title">
            User Management
        </div>

    </div>

    <div
        class="card"
        onclick="location.href='/dashboard'"
    >

        <div class="icon">
            📊
        </div>

        <div class="title">
            Dashboard
        </div>

    </div>

    <div
        class="card"
        onclick="location.href='/ordercode'"
    >

        <div class="icon">
            📦
        </div>

        <div class="title">
            Order Codes
        </div>

    </div>

    <div
        class="card"
        onclick="location.href='/admin/export'"
    >

        <div class="icon">
            📁
        </div>

        <div class="title">
            Export Data
        </div>

    </div>

</div>

<button
    class="logout"
    onclick="location.href='/'"
>

Logout

</button>

</div>

</body>

</html>
