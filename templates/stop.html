<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<title>Stop Registration</title>

<style>

body{

    background:#0f172a;

    color:white;

    font-family:Tahoma;

    margin:20px;

}

.container{

    max-width:900px;

    margin:auto;

}

h1{

    text-align:center;

    font-size:40px;

}

.card{

    background:#1e293b;

    border-radius:20px;

    padding:20px;

    margin-bottom:20px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:15px;

    font-size:24px;

    border:none;

    border-radius:10px;

}

button{

    width:100%;

    padding:15px;

    font-size:24px;

    border:none;

    border-radius:10px;

    margin-top:15px;

    cursor:pointer;

}

#message{

    text-align:center;

    font-size:24px;

    margin-top:15px;

}

table{

    width:100%;

    border-collapse:collapse;

}

th,td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #334155;

}

</style>

</head>

<body>

<div class="container">

    <h1>

        Line {{ line_id }} Stop

    </h1>

    <div class="card">

        <input
            id="minutes"
            type="number"
            placeholder="Stop Minutes"
        >

        <button onclick="saveStop()">

            Save Stop

        </button>

        <div id="message"></div>

    </div>

    <div class="card">

        <h2>

            Last Stops

        </h2>

        <table>

            <thead>

                <tr>

                    <th>

                        Minutes

                    </th>

                    <th>

                        Time

                    </th>

                </tr>

            </thead>

            <tbody id="stopTable">

            </tbody>

        </table>

    </div>

</div>

<script>

async function saveStop(){

    const minutes =

        document.getElementById(
            "minutes"
        ).value;

    const response =

        await fetch(

            "/api/stop",

            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/json"

                },

                body:JSON.stringify({

                    line_id:
                    {{ line_id }},

                    stop_minutes:
                    parseInt(minutes)

                })

            }

        );

    const result =
        await response.json();

    document.getElementById(
        "message"
    ).innerText =

        result.message ||
        result.error;

    document.getElementById(
        "minutes"
    ).value = "";

    loadStops();

}

async function loadStops(){

    const response =

        await fetch(

            "/api/stop/{{ line_id }}"

        );

    const data =
        await response.json();

    let html = "";

    data.forEach(item=>{

        html += `

        <tr>

            <td>

                ${item.minutes}

            </td>

            <td>

                ${item.time}

            </td>

        </tr>

        `;

    });

    document.getElementById(
        "stopTable"
    ).innerHTML = html;

}

loadStops();

</script>

</body>

</html>
