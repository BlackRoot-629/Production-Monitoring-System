<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<title>Production Entry</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

    background:#0f172a;

    color:white;

    font-family:Tahoma;

    margin:20px;

}

.container{

    max-width:900px;

    margin:auto;

}

h1{

    text-align:center;

    font-size:40px;

    margin-bottom:15px;

}

#clock{

    text-align:center;

    font-size:22px;

    color:#cbd5e1;

    margin-bottom:10px;

}

#lastSerial{

    text-align:center;

    font-size:22px;

    color:#38bdf8;

    margin-bottom:20px;

}

.card{

    background:#1e293b;

    border-radius:20px;

    padding:20px;

    margin-bottom:20px;

}

.stats{

    display:flex;

    gap:10px;

    margin-bottom:20px;

}

.statBox{

    flex:1;

    background:#334155;

    border-radius:15px;

    padding:15px;

    text-align:center;

}

.statTitle{

    font-size:18px;

}

.statValue{

    font-size:30px;

    font-weight:bold;

    margin-top:10px;

}

label{

    display:block;

    font-size:22px;

    margin-bottom:10px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:15px;

    font-size:24px;

    border:none;

    border-radius:10px;

    margin-bottom:20px;

}

button{

    width:100%;

    padding:15px;

    font-size:24px;

    border:none;

    border-radius:10px;

    cursor:pointer;

}

#message{

    text-align:center;

    font-size:24px;

    margin-top:15px;

    min-height:35px;

}

.success{

    color:#22c55e;

}

.error{

    color:#ef4444;

}

table{

    width:100%;

    border-collapse:collapse;

}

th,
td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #334155;

}

th{

    background:#334155;

}

</style>

</head>

<body>

<div class="container">

<h1>

Production Line {{ line_id }}

</h1>

<div id="clock"></div>

<div id="lastSerial">

Last Serial : -

</div>

<div class="card">

<div class="stats">

<div class="statBox">

<div class="statTitle">

AIO

</div>

<div
class="statValue"
id="aioCount">

0

</div>

</div>

<div class="statBox">

<div class="statTitle">

MNT

</div>

<div
class="statValue"
id="mntCount">

0

</div>

</div>

<div class="statBox">

<div class="statTitle">

CASE

</div>

<div
class="statValue"
id="caseCount">

0

</div>

</div>

<div class="statBox">

<div class="statTitle">

NB

</div>

<div
class="statValue"
id="nbCount">

0

</div>

</div>

</div>

<label>

Order Number

</label>

<input
id="orderNumber"
placeholder="Scan Order Number"
autofocus
>

<label>

Serial Number

</label>

<input
id="serialNumber"
placeholder="Scan Serial Number"
>

<div id="message"></div>

</div>

<div class="card">

<h2>

Last 20 Serials

</h2>

<table>

<thead>

<tr>

<th>

Time

</th>

<th>

Order

</th>

<th>

Serial

</th>

</tr>

</thead>

<tbody id="serialHistory">

</tbody>

</table>

</div>

</div>

<script>

const orderInput =
document.getElementById("orderNumber");

const serialInput =
document.getElementById("serialNumber");

const message =
document.getElementById("message");

function updateClock(){

const now =
new Date();

document.getElementById(
"clock"
).innerText =

now.toLocaleDateString("fa-IR")

+

" | "

+

now.toLocaleTimeString("fa-IR");

}

updateClock();

setInterval(
updateClock,
1000
);

async function loadCounts(){

const response =
await fetch(
"/api/monitor/{{ line_id }}"
);

const data =
await response.json();

document.getElementById(
"aioCount"
).innerText =
data.aio;

document.getElementById(
"mntCount"
).innerText =
data.mnt;

document.getElementById(
"caseCount"
).innerText =
data.case;

document.getElementById(
"nbCount"
).innerText =
data.nb;

}

async function loadSerialHistory(){

    const response =
        await fetch(
            "/api/serials/{{ line_id }}"
        );

    const data =
        await response.json();

    let html = "";

    data.forEach(item=>{

        html += `

        <tr>

            <td>

                ${item.time}

            </td>

            <td>

                ${item.order}

            </td>

            <td>

                ${item.serial}

            </td>

        </tr>

        `;

    });

    document.getElementById(
        "serialHistory"
    ).innerHTML = html;

}

loadCounts();

loadSerialHistory();

function beep(){

    const audioContext =
        new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

    const oscillator =
        audioContext.createOscillator();

    oscillator.type = "sine";

    oscillator.frequency.value = 1000;

    oscillator.connect(
        audioContext.destination
    );

    oscillator.start();

    setTimeout(()=>{

        oscillator.stop();

    },150);

}

orderInput.addEventListener(
    "keydown",
    function(e){

        if(e.key==="Enter"){

            serialInput.focus();

        }

    }
);

serialInput.addEventListener(
    "keydown",
    async function(e){

        if(e.key!=="Enter")
            return;

        const orderNumber =
            orderInput.value.trim();

        const serialNumber =
            serialInput.value.trim();

        const response =
            await fetch(
                "/api/serial",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        line_id:
                            {{ line_id }},

                        order_number:
                            orderNumber,

                        serial_number:
                            serialNumber

                    })

                }
            );

        const result =
            await response.json();

        if(result.message){

            message.className =
                "success";

            message.innerText =
                "✓ Saved Successfully";

            document.getElementById(
                "lastSerial"
            ).innerText =
                "Last Serial : " +
                serialNumber;

            beep();

            loadCounts();

            loadSerialHistory();

        }
        else{

            message.className =
                "error";

            message.innerText =
                result.error;

        }

        orderInput.value = "";

        serialInput.value = "";

        orderInput.focus();

    }
);

</script>

</body>

</html>
