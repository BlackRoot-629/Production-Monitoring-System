<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#0f172a;

    font-family:Tahoma;

}

.container{

    width:450px;

    background:linear-gradient(
        145deg,
        #2c2c2c,
        #1a1a1a
    );

    padding:40px;

    border-radius:25px;

    box-shadow:
        0 15px 30px rgba(0,0,0,.6);

}

h1{

    color:white;

    text-align:center;

    margin-bottom:30px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:15px;

    margin-bottom:20px;

    border:none;

    border-radius:10px;

    font-size:20px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:20px;

    cursor:pointer;

}

#message{

    margin-top:20px;

    text-align:center;

    color:#ef4444;

    font-size:18px;

}

</style>

</head>

<body>

<div class="container">

    <h1>Production System</h1>

    <input
        id="username"
        placeholder="Username"
    >

    <input
        id="password"
        type="password"
        placeholder="Password"
    >

    <button onclick="login()">

        Login

    </button>

    <div id="message"></div>

</div>

<script>

async function login(){

    const username =
        document.getElementById(
            "username"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;

    const response =
        await fetch(
            "/api/login",
            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    username:
                        username,

                    password:
                        password

                })

            }
        );

    const result =
        await response.json();

    if(result.error){

        document.getElementById(
            "message"
        ).innerText =
            result.error;

        return;

    }

    if(result.role === "operator"){

        window.location.href =
            "/line/" +
            result.line_id;

    }

    if(result.role === "supervisor"){

        window.location.href =
            "/monitor/1";

    }

    if(result.role === "manager"){

        window.location.href =
            "/dashboard";

    }

}

</script>

</body>

</html>
